name: Setup
description: Install the mise toolchain, restore pnpm/turbo caches, and install dependencies.

inputs:
  install-args:
    description: Arguments passed to `pnpm install`.
    default: "--frozen-lockfile"
  turbo-cache:
    description: Whether to restore the turbo build cache.
    default: "true"

runs:
  using: composite
  steps:
    - name: Install mise
      uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

    - name: Setup pnpm cache
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v4
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Setup turbo cache
      if: inputs.turbo-cache == 'true'
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v4
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-

    - name: Install dependencies
      shell: bash
      run: pnpm install ${{ inputs.install-args }}
