name: PR

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".github/workflows/claude*.yml"

concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # Lightweight change detection so downstream jobs can skip entirely.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      extension: ${{ steps.filter.outputs.extension }}
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4

      - name: Check for extension changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            extension:
              - 'apps/extension/**'
              - 'packages/api-contracts/**'

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run quality checks
        run: pnpm quality

  build-and-test:
    name: Build & E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: yoink-api:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup
        uses: ./.github/actions/setup
        with:
          install-args: "--frozen-lockfile --filter @yoink/acceptance-tests..."

      - name: Cache Playwright browsers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @yoink/acceptance-testing exec playwright install chromium

      - name: Run E2E tests
        run: |
          IMAGE=yoink-api:pr-${{ github.event.pull_request.number }} \
          CI=true \
          ./scripts/e2e-test.sh

      - name: Generate Feature Report
        if: always()
        run: |
          REPORT_FILE="packages/acceptance-tests/test-report.md"
          if [ -f "$REPORT_FILE" ]; then
            echo "## Acceptance Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Tests run against Docker container with **HTTP + Playwright drivers**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat "$REPORT_FILE" >> $GITHUB_STEP_SUMMARY
          fi

  extension:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.extension == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          turbo-cache: "false"

      - name: Run extension tests
        run: pnpm --filter @yoink/extension test

      - name: Build extension
        run: pnpm --filter @yoink/extension... build
